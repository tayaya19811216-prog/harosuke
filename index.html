<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ハロスケ</title>

<!-- ✅ CSS -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f3f5f8;
}

.header {
  background: linear-gradient(90deg,#3b6ea5,#4e89d9);
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.header-title {
  font-size: 18px;
}

.filter-box {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

#calendar {
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-title">
    ハロー！プロジェクトスケジュール
  </div>
</div>

<div class="filter-box">
  絞り込みUI（仮）
</div>

<div id="calendar"></div>

<!-- ✅ JS -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
const calendar = new FullCalendar.Calendar(
  document.getElementById("calendar"),
  {
    initialView: "dayGridMonth",
    height: "auto",
    events: [
      { title: "テストイベント", start: "2026-05-10" }
    ]
  }
);

calendar.render();
</script>

</body>
</html>
