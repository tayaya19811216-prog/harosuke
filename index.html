<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハロスケ</title>

<!-- ✅ FullCalendar CSS -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #f0f4f8;
}

/* ===== ヘッダー ===== */
.header {
  background: linear-gradient(90deg,#2f5fa5,#4e89d9);
  color: white;
  padding: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-title {
  font-size: 20px;
  font-weight: bold;
}

.header button {
  margin-left: 10px;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid white;
  background: transparent;
  color: white;
  cursor: pointer;
}

/* ===== フィルター ===== */
.filter-box {
  background: white;
  margin: 15px;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.select-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

select {
  padding: 8px;
  border-radius: 8px;
}

/* ===== ボタン ===== */
button {
  padding: 8px 12px;
  border-radius: 8px;
  background: #4e89d9;
  color: white;
  border: none;
}

button:hover {
  background: #3b6ea5;
}

/* ===== カレンダー ===== */
#calendar {
  background: white;
  margin: 15px;
  padding: 10px;
  border-radius: 12px;
}

/* 今日 */
.fc-day-today {
  background: #fff4cc !important;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-title">
    ハロー！プロジェクト<br>スケジュール
  </div>

  <div>
    <button onclick="setLang('ja')">JP</button>
    <button onclick="setLang('en')">EN</button>
  </div>
</div>

<div class="filter-box">

  <div class="select-row">
    <select id="groupSelect" onchange="updateMembers()">
      <option value="ALL">すべて</option>
      <option value="BEYOOOOONDS">BEYOOOOONDS</option>
      <option value="モーニング娘。">モーニング娘。</option>
    </select>

    <select id="memberSelect"></select>

    <select id="typeSelect">
      <option value="ALL">すべて</option>
      <option value="CONCERT">CONCERT</option>
      <option value="EVENT">EVENT</option>
    </select>
  </div>

  <button onclick="applyFilter()">適用</button>
  <button onclick="resetFilter()">リセット</button>

</div>

<div id="calendar"></div>

<!-- ✅ FullCalendar JS -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
// ===== データ =====
const membersByGroup = {
  "BEYOOOOONDS": ["全員", "一岡", "島倉", "西田"],
  "モーニング娘。": ["全員", "譜久村", "石田", "小田"]
};

const allEvents = [
  { title: "BEYO LIVE", date: "2026-05-10", group: "BEYOOOOONDS", member: "一岡", type: "CONCERT" },
  { title: "BEYO EVENT", date: "2026-05-12", group: "BEYOOOOONDS", member: "島倉", type: "EVENT" },
  { title: "Morning LIVE", date: "2026-05-20", group: "モーニング娘。", member: "石田", type: "CONCERT" }
];

// ===== カレンダー =====
const calendar = new FullCalendar.Calendar(
  document.getElementById("calendar"),
  {
    initialView: "dayGridMonth",
    locale: "ja",

    headerToolbar: {
      left: "prev,next today",
      center: "title",
      right: "dayGridMonth,timeGridWeek,listWeek"
    },

    buttonText: {
      today: "今日",
      month: "月",
      week: "週",
      list: "リスト"
    },

    events: allEvents,

    // ✅ ⭐ イベントクリック詳細表示
    eventClick: function(info) {
      const e = info.event.extendedProps;

      alert(
        "タイトル：" + info.event.title + "\n" +
        "日付：" + info.event.startStr + "\n" +
        "グループ：" + e.group + "\n" +
        "メンバー：" + e.member + "\n" +
        "種類：" + e.type
      );
    }
  }
);

calendar.render();

// ===== メンバー更新 =====
function updateMembers() {
  const group = document.getElementById("groupSelect").value;
  const memberSelect = document.getElementById("memberSelect");

  memberSelect.innerHTML = "";

  const list = membersByGroup[group] || ["全員"];

  list.forEach(m => {
    const opt = document.createElement("option");
    opt.value = m;
    opt.textContent = m;
    memberSelect.appendChild(opt);
  });
}

// ===== フィルター =====
function applyFilter() {
  const group = document.getElementById("groupSelect").value;
  const member = document.getElementById("memberSelect").value;
  const type = document.getElementById("typeSelect").value;

  const filtered = allEvents.filter(e => {
    const g = (group === "ALL") || e.group === group;
    const m = (!member || member === "全員") || e.member === member;
    const t = (type === "ALL") || e.type === type;
    return g && m && t;
  });

  calendar.removeAllEvents();
  calendar.addEventSource(filtered);
}

// ===== リセット =====
function resetFilter() {
  document.getElementById("groupSelect").value = "ALL";
  document.getElementById("typeSelect").value = "ALL";

  updateMembers();
  calendar.removeAllEvents();
  calendar.addEventSource(allEvents);
}

// ===== 言語 =====
function setLang(l){
  calendar.setOption('locale', l === 'ja' ? 'ja' : 'en');
}

// 初期化
updateMembers();
</script>

</body>
</html>
