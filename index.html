<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ハロスケ</title>

https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f3f5f8;
}

/* ヘッダー */
.header {
  background: linear-gradient(90deg,#3b6ea5,#4e89d9);
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-title {
  font-size: 20px;
  font-weight: bold;
}

.header-right button {
  margin-left: 10px;
  padding: 6px 10px;
  border-radius: 20px;
  border: 1px solid white;
  background: transparent;
  color: white;
}

/* フィルタ */
.filter-box {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

.filter-box h3 {
  color: #3b6ea5;
}

.select-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

select, button {
  padding: 8px;
  border-radius: 6px;
}

/* カレンダー */
#calendar {
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-title">ハロー！プロジェクト<br>スケジュール</div>
  <div class="header-right">
    <button onclick="setLang('ja')">JP</button>
    <button onclick="setLang('en')">EN</button>
    <button>キャッシュ残り 57分</button>
  </div>
</div>

<div class="filter-box">
  <h3>絞り込み</h3>

  <div class="select-row">
    <select>
      <option>2026年</option>
    </select>

    <select>
      <option>BEYOOOOONDS</option>
    </select>
  </div>

  <div class="select-row">
    <select>
      <option>すべてのメンバー</option>
    </select>

    <select>
      <option>CONCERT</option>
    </select>
  </div>

  <button>適用</button>
  <button>リセット</button>

</div>

<div id="calendar"></div>

https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js>

<script>
let lang = "ja";

function setLang(l){
  lang = l;
  calendar.setOption('locale', l === 'ja' ? 'ja' : 'en');
}

const events = [
  { title: "BEYOOOOONDS LIVE", start: "2026-05-03" },
  { title: "BEYOOOOONDS LIVE", start: "2026-05-09" },
  { title: "BEYOOOOONDS LIVE", start: "2026-05-17" },
  { title: "BEYOOOOONDS LIVE", start: "2026-05-24" },
];

const calendar = new FullCalendar.Calendar(document.getElementById("calendar"), {
  initialView: "dayGridMonth",
  locale: "ja",
  height: "auto",
  events: events
});

calendar.render();
</script>

</body>
</html>
