<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハロスケ</title>

<!-- ✅ FullCalendar CSS -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #f0f4f8;
}

.header {
  background: linear-gradient(90deg,#2f5fa5,#4e89d9);
  color: white;
  padding: 16px;
  display: flex;
  justify-content: space-between;
}

.header-title {
  font-size: 20px;
  font-weight: bold;
}

.filter-box {
  background: white;
  margin: 15px;
  padding: 20px;
  border-radius: 12px;
}

.select-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

select, button {
  padding: 8px;
  border-radius: 8px;
}

#calendar {
  background: white;
  margin: 15px;
  padding: 10px;
  border-radius: 12px;
}

.fc-day-today {
  background: #fff4cc !important;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-title">
    ハロー！プロジェクト<br>スケジュール
  </div>

  <div>
    <button onclick="setLang('ja')">JP</button>
    <button onclick="setLang('en')">EN</button>
  </div>
</div>

<div class="filter-box">

  <div class="select-row">
    <select id="groupSelect" onchange="updateMembers()">
      <option value="ALL">すべて</option>
      <option value="BEYOOOOONDS">BEYOOOOONDS</option>
      <option value="モーニング娘。">モーニング娘。</option>
    </select>

    <select id="memberSelect"></select>

    <select id="typeSelect">
      <option value="ALL">すべて</option>
      <option value="CONCERT">CONCERT</option>
      <option value="EVENT">EVENT</option>
    </select>
  </div>

  <button onclick="applyFilter()">適用</button>
  <button onclick="resetFilter()">リセット</button>

</div>

<div id="calendar"></div>

<!-- ✅ FullCalendar JS -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>

// ===== 重要：配列は空で定義 =====
let allEvents = [];

// ===== メンバー =====
const membersByGroup = {
  "BEYOOOOONDS": ["全員", "一岡", "島倉", "西田"],
  "モーニング娘。": ["全員", "譜久村", "石田", "小田"]
};

// ===== カレンダー =====
const calendar = new FullCalendar.Calendar(
  document.getElementById("calendar"),
  {
    initialView: "dayGridMonth",
    locale: "ja",

    headerToolbar: {
      left: "prev,next today",
      center: "title",
      right: "dayGridMonth,timeGridWeek,listWeek"
    },

    buttonText: {
      today: "今日",
      month: "月",
      week: "週",
      list: "リスト"
    },

    events: [],   // ←ここ重要（空）

    eventClick: function(info) {
      const e = info.event.extendedProps;

      alert(
        "タイトル：" + info.event.title + "\n" +
        "日付：" + info.event.startStr + "\n" +
        "グループ：" + e.group + "\n" +
        "メンバー：" + e.member + "\n" +
        "種類：" + e.type
      );
    }
  }
);

calendar.render();

// ===== ✅ JSON読み込み（ここが本物化の心臓） =====
fetch("events.json")
  .then(res => res.json())
  .then(data => {
    console.log("JSON読み込み成功:", data);  // ←デバッグ用
    allEvents = data;
    calendar.addEventSource(allEvents);
  })
  .catch(err => {
    console.error("JSON読み込み失敗:", err);
  });

// ===== メンバー更新 =====
function updateMembers() {
  const group = document.getElementById("groupSelect").value;
  const memberSelect = document.getElementById("memberSelect");

  memberSelect.innerHTML = "";

  const list = membersByGroup[group] || ["全員"];

  list.forEach(m => {
    const opt = document.createElement("option");
    opt.value = m;
    opt.textContent = m;
    memberSelect.appendChild(opt);
  });
}

// ===== フィルター =====
function applyFilter() {
  const group = document.getElementById("groupSelect").value;
  const member = document.getElementById("memberSelect").value;
  const type = document.getElementById("typeSelect").value;

  const filtered = allEvents.filter(e => {
    return (group === "ALL" || e.group === group) &&
           (member === "全員" || e.member === member) &&
           (type === "ALL" || e.type === type);
  });

  calendar.removeAllEvents();
  calendar.addEventSource(filtered);
}

// ===== リセット =====
function resetFilter() {
  document.getElementById("groupSelect").value = "ALL";
  document.getElementById("typeSelect").value = "ALL";

  updateMembers();

  calendar.removeAllEvents();
  calendar.addEventSource(allEvents);
}

// ===== 言語 =====
function setLang(l){
  calendar.setOption('locale', l === 'ja' ? 'ja' : 'en');
}

// 初期化
updateMembers();

</script>

</body>
</html>
